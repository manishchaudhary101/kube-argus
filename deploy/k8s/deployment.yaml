apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sdash
  namespace: k8sdash
  labels:
    app: k8sdash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8sdash
  template:
    metadata:
      labels:
        app: k8sdash
    spec:
      serviceAccountName: k8sdash
      containers:
        - name: k8sdash
          image: ghcr.io/manishchaudhary101/k8sdash:latest
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: k8sdash-config
                optional: true
          env:
            - name: PORT
              value: "8080"
            - name: CLUSTER_NAME
              value: "my-cluster"  # Replace with your cluster name
---
apiVersion: v1
kind: Service
metadata:
  name: k8sdash
  namespace: k8sdash
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    app: k8sdash
