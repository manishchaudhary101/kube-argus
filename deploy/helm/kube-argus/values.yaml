replicaCount: 2

image:
  repository: ghcr.io/manishchaudhary101/kube-argus
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kube-argus.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  CLUSTER_NAME: ""
  DEFAULT_ROLE: "viewer"
  LOG_LEVEL: "info"
  # ── Google SSO (Option A) ──
  # GOOGLE_CLIENT_ID: ""
  # GOOGLE_CLIENT_SECRET: ""
  # ── Generic OIDC (Option B) ──
  # OIDC_ISSUER: ""
  # OIDC_CLIENT_ID: ""
  # OIDC_CLIENT_SECRET: ""
  # OIDC_ADMIN_GROUP: "admin"
  # ── Roles & Session ──
  # ADMIN_EMAILS: ""
  # SESSION_SECRET: ""
  # SESSION_TTL: "8h"
  # CORS_ORIGIN: ""
  # ── Integrations ──
  # PROMETHEUS_URL: ""
  # PROMETHEUS_USER: ""
  # PROMETHEUS_KEY: ""
  # LLM_GATEWAY_URL: ""
  # LLM_GATEWAY_KEY: ""
  # LLM_GATEWAY_MODEL: ""
  # AWS_SECRET_NAME: ""
  # AWS_REGION: "us-east-1"

existingSecret: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels: {}

jit:
  persistence:
    enabled: true
  retentionDays: 7

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - kube-argus
          topologyKey: kubernetes.io/hostname
