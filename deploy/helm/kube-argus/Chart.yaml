apiVersion: v2
name: kube-argus
description: Real-time Kubernetes dashboard with live state, cost analysis, and AI-powered diagnostics
type: application
version: 1.2.5
appVersion: "1.2.5"
keywords:
  - kubernetes
  - dashboard
  - monitoring
  - sre
  - jit-access
  - security
icon: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/logo.svg
home: https://github.com/manishchaudhary101/kube-argus
sources:
  - https://github.com/manishchaudhary101/kube-argus
maintainers:
  - name: manishchaudhary101
    email: imanishchaudhary@gmail.com
    url: https://github.com/manishchaudhary101
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: "Slack notifications for JIT access requests with interactive Approve/Deny buttons"
    - kind: added
      description: "Dashboard Settings modal for configuring Slack integration (webhook URL and signing secret)"
    - kind: added
      description: "Node allocated resources showing pod requests/limits with overcommit warnings"
    - kind: added
      description: "Pod log viewer with search, configurable tail size, and error/warning line highlighting"
    - kind: added
      description: "Online users expanded to 24h window with Online/Away/Offline status groups"
    - kind: added
      description: "Audit trail Access Requests filter tab and immediate persistence"
    - kind: changed
      description: "Helm image tag defaults to Chart appVersion instead of latest"
    - kind: changed
      description: "Code splitting with React.lazy and manual chunk splitting for faster initial load"
    - kind: changed
      description: "Prometheus query cache (30s TTL) and pre-computed lookup maps for O(1) pod resolution"
    - kind: changed
      description: "SWR client-side cache eliminates loading flicker on view revisits"
    - kind: fixed
      description: "All API errors now return JSON instead of plain text, preventing frontend parse failures"
    - kind: fixed
      description: "Kubernetes NotFound errors return 404 instead of 500 for terminated nodes, pods, and workloads"
    - kind: fixed
      description: "Audit trail no longer generates false session resume login events"
    - kind: fixed
      description: "Light theme chart colors and smooth theme transition animations"
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/manishchaudhary101/kube-argus
  artifacthub.io/screenshots: |
    - title: Cluster Overview — Real-time node and pod status
      url: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/screenshot-overview.png
    - title: Node Detail — Pod heatmap, conditions, and drain wizard
      url: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/screenshot-node-detail.png
    - title: Pod Metrics — Prometheus CPU and memory charts
      url: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/screenshot-pod-metrics.png
    - title: Spot Advisor — Cost optimization and instance recommendations
      url: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/screenshot-spot-advisor.png
