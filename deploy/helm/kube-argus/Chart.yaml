apiVersion: v2
name: kube-argus
description: Real-time Kubernetes dashboard with live state, cost analysis, and AI-powered diagnostics
type: application
version: 1.2.3
appVersion: "1.2.3"
keywords:
  - kubernetes
  - dashboard
  - monitoring
  - sre
  - jit-access
  - security
icon: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/logo.svg
home: https://github.com/manishchaudhary101/kube-argus
sources:
  - https://github.com/manishchaudhary101/kube-argus
maintainers:
  - name: manishchaudhary101
    email: imanishchaudhary@gmail.com
    url: https://github.com/manishchaudhary101
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: "Namespace favorites - star namespaces in the picker, persisted per-user in localStorage"
    - kind: added
      description: "CronJob manual trigger - Run Now button with JIT approval workflow for viewers"
    - kind: added
      description: "Custom JIT duration - hours/days input up to 7 days max alongside preset durations"
    - kind: added
      description: "Pod restart timeline - color-coded scatter chart showing restart events with reasons"
    - kind: added
      description: "Init container visibility - all workload types now display init containers with an INIT badge"
    - kind: added
      description: "Service detail view - type, clusterIP, ports, selector, endpoint pods"
    - kind: added
      description: "HPA detail view - target workload, replicas, metrics, conditions"
    - kind: changed
      description: "Resource graph click-through - Service and HPA open detail views"
    - kind: fixed
      description: "CronJob detail crash when no job history"
    - kind: fixed
      description: "Restart timeline OOMKilled events showing as Other instead of red"
    - kind: fixed
      description: "JIT modal title now context-aware for CronTrigger vs Pod Shell"
    - kind: fixed
      description: "JIT restore log moved to DEBUG level"
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/manishchaudhary101/kube-argus
  artifacthub.io/screenshots: |
    - title: Cluster Overview — Real-time node and pod status
      url: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/screenshot-overview.png
    - title: Node Detail — Pod heatmap, conditions, and drain wizard
      url: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/screenshot-node-detail.png
    - title: Pod Metrics — Prometheus CPU and memory charts
      url: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/screenshot-pod-metrics.png
    - title: Spot Advisor — Cost optimization and instance recommendations
      url: https://raw.githubusercontent.com/manishchaudhary101/kube-argus/master/docs/screenshot-spot-advisor.png
