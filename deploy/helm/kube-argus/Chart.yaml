annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: "Structured JSON logging via Go's log/slog — all log output is now machine-readable JSON to stdout"
    - kind: added
      description: "Configurable LOG_LEVEL environment variable (debug, info, warn, error) with case-insensitive parsing"
    - kind: added
      description: "LOG_LEVEL exposed in Helm values.yaml with default 'info'"
    - kind: changed
      description: "Replaced all standard log package usage with slog across 9 Go source files"
    - kind: changed
      description: "README redesigned with centered hero layout, expanded badge row, and collapsible feature sections"
