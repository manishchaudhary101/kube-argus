  - annotations:
      artifacthub.io/changes: |
        - kind: added
          description: Just-in-Time (JIT) exec access — viewers request time-bound shell access, admins approve/deny from the dashboard
        - kind: added
          description: JIT persistence via ConfigMap — access requests survive restarts and are shared across replicas
        - kind: added
          description: Notification badge on admin avatar showing pending JIT request count
        - kind: added
          description: Access Requests in admin dropdown (alongside Online Users and Audit Trail)
        - kind: added
          description: Deployment-scoped JIT grants — access is scoped to the workload, not individual pods
        - kind: added
          description: Auto-expiring pending requests (48h TTL) and configurable retention for terminal states
